{d:"24.4.3-24.5.4",m:"first_meeting_fzy",i:["media/24.4.3-24.5.4/first_meeting_fzy/IMG_7292.JPG", "media/24.4.3-24.5.4/first_meeting_fzy/d9ad25cda88d42efd76e2820c697e5e5.jpg"],v:[],t:"第一次和樊镇熠正式见面，我和他的记忆都说是完全不记得怎么那么熟了，一个冲动认识了一下——结果没想到是个这么好的朋友。"},
{d:"24.6.8-24.7.5",m:"first_wwkshutup_group_meetup",i:["media/24.6.8-24.7.5/first_wwkshutup_group_meetup/787032f47c247781175cf6a54e945904.jpg", "media/24.6.8-24.7.5/first_wwkshutup_group_meetup/IMG_8985.HEIC", "media/24.6.8-24.7.5/first_wwkshutup_group_meetup/a1daaf1db4764124f0346c0107f9dcf3.jpg"],v:[],t:"叔叔这个熟了吗？叔叔你怎么走了。把你桌洞里的东西拿出来！"},

{d:"25.1.19",m:"senior_hotpot_onlymeet",i:["media/25.1.19/senior_hotpot_onlymeet/IMG_1607.HEIC"],v:["media/25.1.19/senior_hotpot_onlymeet/IMG_1603.MOV"],t:"这是我们俩高三唯一一次线下见面，我太想念你了。我们那天聊了很多，我一直以为我们不能更亲近了，那天晚上过去后我发现居然还可以更亲密。李洁榕你太美好了，我那天又在感激命运让我们相遇，感谢我们从来不放开彼此的手。"},
{d:"25.5.24",m:"last_video_call_before_Gaokao",i:["media/25.5.24/last_video_call_before_Gaokao/IMG_2708.JPEG"],v:[],t:"我对高考完全不慌，可我就是迫切地想和你说话，好像只有和你说话才能让我平静。我们俩那天聊了啥我也不记得了（是不是王伟坤被打了），我就记得电话挂了以后我心里有底了，是一种平静的力量吧。"},
{d:"25.6.8-25.6.12",m:"coming_of_age",i:["media/25.6.8-25.6.12/coming_of_age/IMG_2972.HEIC", "media/25.6.8-25.6.12/coming_of_age/IMG_2979.HEIC", "media/25.6.8-25.6.12/coming_of_age/IMG_2988.HEIC", "media/25.6.8-25.6.12/coming_of_age/IMG_3011.HEIC"],v:["media/25.6.8-25.6.12/coming_of_age/IMG_3015_live.MOV"],t:"谢谢你能来我的成人礼，你又见证了我一个重要时刻。那天见到了好多好多一中的人，你是那个我最想见的女孩。"},
{d:"25.6.8-25.6.12",m:"second_wwkshutup_group_meetup",i:["media/25.6.8-25.6.12/second_wwkshutup_group_meetup/IMG_2653.HEIC", "media/25.6.8-25.6.12/second_wwkshutup_group_meetup/IMG_3076.JPG", "media/25.6.8-25.6.12/second_wwkshutup_group_meetup/IMG_3090.HEIC", "media/25.6.8-25.6.12/second_wwkshutup_group_meetup/IMG_3109.HEIC", "media/25.6.8-25.6.12/second_wwkshutup_group_meetup/IMG_3133.HEIC"],v:["media/25.6.8-25.6.12/second_wwkshutup_group_meetup/IMG_3071_live.MOV", "media/25.6.8-25.6.12/second_wwkshutup_group_meetup/IMG_3083_live.MOV", "media/25.6.8-25.6.12/second_wwkshutup_group_meetup/IMG_3087_live.MOV"],t:"那天太高兴了，姚霁洋带了专门讲八卦的小白板，欧阳带了酒结果他醉的最快（虽然你也喝多了），你短袖上的“我只和男模约会”，我一直走不出这个小梅鸽，而且我每次打开大众点评都能看到那个假评论。"},
{d:"25.6.8-25.6.12",m:"yaya_18th_birthday",i:["media/25.6.8-25.6.12/yaya_18th_birthday/IMG_2167.HEIC", "media/25.6.8-25.6.12/yaya_18th_birthday/IMG_2174.HEIC", "media/25.6.8-25.6.12/yaya_18th_birthday/IMG_2178.HEIC", "media/25.6.8-25.6.12/yaya_18th_birthday/IMG_2179.HEIC", "media/25.6.8-25.6.12/yaya_18th_birthday/IMG_2744.HEIC"],v:["media/25.6.8-25.6.12/yaya_18th_birthday/IMG_2164_live.MOV", "media/25.6.8-25.6.12/yaya_18th_birthday/IMG_2166_live.MOV"],t:"终于高考完了，我们三个那天彻底疯了。给牙牙补过了她的18岁生日，高考完立马见的是你们，真的让我好幸福，一切都在告诉我们彼此有多重要。"},
{d:"25.6.16",m:"ur_18th_birthday_celebration",i:["media/25.6.16/ur_18th_birthday_celebration/00d998327e578419bcbf0d9c178652c6.jpg", "media/25.6.16/ur_18th_birthday_celebration/0863d52265480aea3ed44b52b76bfb34.jpg", "media/25.6.16/ur_18th_birthday_celebration/1d78f4ffcb7b3ada5cf91757fc26b2c5.jpg", "media/25.6.16/ur_18th_birthday_celebration/653d8f20859af31ce4ac9aaa38ff8833.jpg", "media/25.6.16/ur_18th_birthday_celebration/8e16a3e2e08c81a1a337f1e0934980d3.jpg", "media/25.6.16/ur_18th_birthday_celebration/IMG_3224.HEIC", "media/25.6.16/ur_18th_birthday_celebration/IMG_3285.HEIC", "media/25.6.16/ur_18th_birthday_celebration/IMG_3287.HEIC", "media/25.6.16/ur_18th_birthday_celebration/IMG_7395.JPG", "media/25.6.16/ur_18th_birthday_celebration/IMG_7396.JPG", "media/25.6.16/ur_18th_birthday_celebration/IMG_7406.JPG", "media/25.6.16/ur_18th_birthday_celebration/IMG_7413.JPEG", "media/25.6.16/ur_18th_birthday_celebration/b38e7999a013fa24608df19e7eac4457.jpg", "media/25.6.16/ur_18th_birthday_celebration/bd2a7a5aac19352c78f3a9280363d4e6.jpg", "media/25.6.16/ur_18th_birthday_celebration/c967091b469081a3882c6c264b2b796d.jpg", "media/25.6.16/ur_18th_birthday_celebration/d707d52790d6fe472775c4ce7da04ffb.jpg"],v:[],t:"这么重要的日子我居然睡过了，我真的不知道为什么。而且我也没给你送生日礼物，我们两个好像全都忘了，，，但没事我这次给你憋了个大的！那天轻松熊的蛋糕真的好好吃，拍了好多漂亮的拍立得。"},
{d:"25.6.20-25.8.26",m:"Tsinghua_admission_letter",i:["media/25.6.20-25.8.26/Tsinghua_admission_letter/IMG_5890.HEIC"],v:[],t:"这天太可笑了，我最开始不知道王伟坤真的把录取通知书带过来给我俩拍照玩了，然后我俩走的时候你还打了个无敌商务车，真的好搞笑，最后抖音疑似找到流量密码，成为历史高赞视频？"},
